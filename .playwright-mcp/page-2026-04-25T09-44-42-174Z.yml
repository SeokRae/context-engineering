          - list [ref=e148]:
            - listitem [ref=e149]: "Evaluate each candidate on 3 criteria: Relevance / Recency / Reliability"
            - listitem [ref=e150]: "Keep: all 3 criteria met"
            - listitem [ref=e151]: "Skip: any criterion fails — document reason explicitly"
            - listitem [ref=e152]: "Merge: 70%+ semantic overlap → retain higher-reliability version"
          - generic [ref=e153]: "G3 auto-pass if: criteria applied consistently, all Skip items have stated reasons, Keep set sufficient for Phase 1 purpose."
          - generic [ref=e154]: /context-engineering:gather
        - generic [ref=e155] [cursor=pointer]:
          - generic [ref=e156]: Phase 4
          - generic [ref=e158]: Structuring
          - list [ref=e159]:
            - listitem [ref=e160]: "Organize Keep items into 4 sections: Key Facts / Constraints / Decisions / Notes"
            - listitem [ref=e161]: One item per fact, constraint, or decision — no compound entries
            - listitem [ref=e162]: Empty sections omitted entirely
            - listitem [ref=e163]: No duplication across sections
          - generic [ref=e164]: "G4 auto-pass if: no ambiguous items, no cross-section duplicates, Key Facts directly connected to Phase 1 purpose."
          - generic [ref=e165]: /context-engineering:build
        - generic [ref=e166] [cursor=pointer]:
          - generic [ref=e167]: Phase 5
          - generic [ref=e169]: Compression
          - list [ref=e170]:
            - listitem [ref=e171]: "Measure token budget: small < 500w (no compression), medium 500-2000w (50%), large 2000+w (30%)"
            - listitem [ref=e172]: "Compress in order: Notes first → Key Facts → Constraints last resort"
            - listitem [ref=e173]: Constraints and Decisions are never compressed — preserved verbatim
            - listitem [ref=e174]: "Large sources: scan headers/TOC first, then load purpose-relevant sections only"
          - generic [ref=e175]: "G5 auto-pass if: Constraints and Decisions preserved verbatim, no over-compression of Key Facts, token budget target met."
          - generic [ref=e176]: /context-engineering:build
