            - listitem [ref=e141]: "KB miss: notify user, proceed with general knowledge"
          - generic [ref=e142]: "G2 auto-pass if: all Phase 1 constraint-mentioned sources collected, no obvious omissions. Otherwise ask if a suspected missing source is needed."
