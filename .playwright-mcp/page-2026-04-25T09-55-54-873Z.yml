            - listitem [ref=e150]: "Sources over 10,000 words: confirm section split before loading"
            - listitem [ref=e151]: "KB miss: notify user, proceed with general knowledge"
          - generic [ref=e152]: "G2 auto-pass if: all Phase 1 constraint-mentioned sources collected, no obvious omissions. Otherwise ask if a suspected missing source is needed."
