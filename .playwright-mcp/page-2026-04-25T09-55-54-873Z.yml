          - generic [ref=e157]: Context Selection
          - list [ref=e158]:
            - listitem [ref=e159]: "Evaluate each candidate on 3 criteria: Relevance / Recency / Reliability"
            - listitem [ref=e160]: "Keep: all 3 criteria met"
            - listitem [ref=e161]: "Skip: any criterion fails — document reason explicitly"
            - listitem [ref=e162]: "Merge: 70%+ semantic overlap → retain higher-reliability version"
          - generic [ref=e163]: "G3 auto-pass if: criteria applied consistently, all Skip items have stated reasons, Keep set sufficient for Phase 1 purpose."
          - generic [ref=e164]: /context-engineering:gather
        - generic [ref=e165] [cursor=pointer]:
          - generic [ref=e166]: Phase 4
          - generic [ref=e168]: Structuring
          - list [ref=e169]:
            - listitem [ref=e170]: "Organize Keep items into 4 sections: Key Facts / Constraints / Decisions / Notes"
            - listitem [ref=e171]: One item per fact, constraint, or decision — no compound entries
            - listitem [ref=e172]: Empty sections omitted entirely
            - listitem [ref=e173]: No duplication across sections
          - generic [ref=e174]: "G4 auto-pass if: no ambiguous items, no cross-section duplicates, Key Facts directly connected to Phase 1 purpose."
          - generic [ref=e175]: /context-engineering:build
        - generic [ref=e176] [cursor=pointer]:
          - generic [ref=e177]: Phase 5
          - generic [ref=e179]: Compression
          - list [ref=e180]:
            - listitem [ref=e181]: "Measure token budget: small < 500w (no compression), medium 500-2000w (50%), large 2000+w (30%)"
            - listitem [ref=e182]: "Compress in order: Notes first → Key Facts → Constraints last resort"
            - listitem [ref=e183]: Constraints and Decisions are never compressed — preserved verbatim
            - listitem [ref=e184]: "Large sources: scan headers/TOC first, then load purpose-relevant sections only"
          - generic [ref=e185]: "G5 auto-pass if: Constraints and Decisions preserved verbatim, no over-compression of Key Facts, token budget target met."
          - generic [ref=e186]: /context-engineering:build
